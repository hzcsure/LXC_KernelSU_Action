name: Build kernel by proton clang for sagit MT7601U
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
    - uses: actions/checkout@v4
    - name: Prepare Configuration
      run: |
        CONFIG_ENV=$(cat config.env | grep -w "CONFIG_ENV" | head -n 1 | cut -d "=" -f 2)
        echo "KERNEL_SOURCE=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_SOURCE_BRANCH=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_CONFIG=$(cat $CONFIG_ENV | grep -w "KERNEL_CONFIG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_IMAGE_NAME=$(cat $CONFIG_ENV | grep -w "KERNEL_IMAGE_NAME" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ARCH=$(cat $CONFIG_ENV | grep -w "ARCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "CUSTOM_CMDS=$(cat $CONFIG_ENV | grep -w "CUSTOM_CMDS" | head -n 1 | cut -d ":" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_GCC_ARM64=$(cat $CONFIG_ENV | grep -w "ENABLE_GCC_ARM64" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_GCC_ARM32=$(cat $CONFIG_ENV | grep -w "ENABLE_GCC_ARM32" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_KERNELSU=$(cat $CONFIG_ENV | grep -w "ENABLE_KERNELSU" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNELSU_TAG=$(cat $CONFIG_ENV | grep -w "KERNELSU_TAG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "DISABLE_LTO=$(cat $CONFIG_ENV | grep -w "DISABLE-LTO" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "DISABLE_CC_WERROR=$(cat $CONFIG_ENV | grep -w "DISABLE_CC_WERROR" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_CCACHE=$(cat $CONFIG_ENV | grep -w "ENABLE_CCACHE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "NEED_DTBO=$(cat $CONFIG_ENV | grep -w "NEED_DTBO" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "BUILD_BOOT_IMG=$(cat $CONFIG_ENV | grep -w "BUILD_BOOT_IMG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "SOURCE_BOOT_IMAGE=$(cat $CONFIG_ENV | grep -w "SOURCE_BOOT_IMAGE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_LXC=$(cat $CONFIG_ENV | grep -w "ENABLE_LXC" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_PROTON_CLANG=$(cat $CONFIG_ENV | grep -w "ENABLE_PROTON_CLANG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "PROTON_CLANG_SOURCE=$(cat $CONFIG_ENV | grep -w "PROTON_CLANG_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "PROTON_CLANG_BRANCH=$(cat $CONFIG_ENV | grep -w "PROTON_CLANG_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ADD_KPROBES_CONFIG=$(cat $CONFIG_ENV | grep -w "ADD_KPROBES_CONFIG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ADD_OVERLAYFS_CONFIG=$(cat $CONFIG_ENV | grep -w "ADD_OVERLAYFS_CONFIG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build kernel environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "DEVICE=$(echo ${{ env.KERNEL_CONFIG }} | sed 's!vendor/!!;s/_defconfig//;s/_user//;s/-perf//')" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt install -y curl python2 libelf-dev llvm lld wget vim git ccache automake flex lzop bison gperf build-essential zip zlib1g-dev libxml2-utils bzip2 libbz2-dev squashfs-tools schedtool dpkg-dev liblz4-tool make libssl-dev bc libc6-dev-i386 lib32ncurses5-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler kmod python3 python3-pip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Download Proton-Clang
      if: env.ENABLE_PROTON_CLANG == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [[ ${{ env.PROTON_CLANG_SOURCE }} =~ git ]]; then
            if [[ ${{ env.PROTON_CLANG_SOURCE }} == *'.tar.gz' ]]; then
                wget -O clang.tar.gz ${{ env.PROTON_CLANG_SOURCE }}
                mkdir clang-aosp
                tar -C clang-aosp/ -zxvf clang.tar.gz
            else
                git clone ${{ env.PROTON_CLANG_SOURCE }} -b ${{ env.PROTON_CLANG_BRANCH }} clang-aosp --depth=1
            fi
        else
            wget -O clang.zip ${{ env.PROTON_CLANG_SOURCE }}
            mkdir clang-aosp
            unzip clang.zip -d clang-aosp/
        fi

    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1

    - name: Pre-flight sanity check
      run: |
        set -e
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        echo "=== 1. Proton Clang ==="
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        which clang && clang --version | head -1

        echo "=== 2. Cross compilers ==="
        aarch64-linux-gnu-gcc --version | head -1
        arm-linux-gnueabi-gcc --version | head -1

        echo "=== 3. python2 ==="
        python2 --version

        echo "=== 4. Defconfig exists ==="
        ls -l arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}

        echo "=== 5. Quick defconfig dry-run ==="
        make -s CC=clang O=out ARCH=${{ env.ARCH }} CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- ${{ env.KERNEL_CONFIG }} 2>&1 | tail -1
        test -f out/.config && echo "OK: .config generated" || { echo "FAIL: no .config"; exit 1; }

        echo "=== 6. Check VDSO disabled ==="
        grep COMPAT_VDSO out/.config

        echo "=== 7. Check MT7601U enabled ==="
        grep -E "CONFIG_MT7601U|CONFIG_MAC80211" out/.config || echo "WARNING: not found (will be injected in next step)"

        echo "=== ALL CHECKS PASSED ==="

    - name: Setup Configuration for Kernel (MT7601U + VDSO fix)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        # === MT7601U WiFi driver ===
        echo "CONFIG_WL_MEDIATEK=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_MAC80211=m" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_MT7601U=m" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_CRYPTO_CCM=m" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # === USB OTG support ===
        echo "CONFIG_USB_OTG=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_USB_OTG_FSM=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_USB_CONFIGFS=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # === Fix clang VDSO error: /usr/bin/as unrecognized option -EL ===
        sed -i 's/CONFIG_COMPAT_VDSO=y/# CONFIG_COMPAT_VDSO is not set/' arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # === Disable stack protector (clang compat) ===
        sed -i "s/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/g" arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # === Disable LTO ===
        if [ "${{ env.DISABLE_LTO }}" = "true" ]; then
            sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/' arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
            sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_CLANG=n/' arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
            sed -i 's/CONFIG_THINLTO=y/CONFIG_THINLTO=n/' arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
            echo "CONFIG_LTO_NONE=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        fi
        if [ "${{ env.DISABLE_CC_WERROR }}" = "true" ]; then
            echo "CONFIG_CC_WERROR=n" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        fi
        # === Fix mac80211 IEEE80211_BAND_60GHZ (not in 4.4 kernel enum) ===
        # Apply define to ALL mac80211 source files that reference it
        for f in $(grep -rl 'IEEE80211_BAND_60GHZ' net/mac80211/); do
            sed -i '1i#define IEEE80211_BAND_60GHZ 2' "$f"
        done
        echo "=== Verify config ==="
        grep -E "WL_MEDIATEK|MAC80211|MT7601U|CRYPTO_CCM|COMPAT_VDSO|USB_OTG|STACKPROTECTOR" arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        # Unset config.env feature flags -- they pollute kernel Makefile $(VAR) expansion
        unset DISABLE_LTO DISABLE_CC_WERROR ADD_KPROBES_CONFIG ADD_OVERLAYFS_CONFIG
        unset ENABLE_LXC ENABLE_KERNELSU ENABLE_PROTON_CLANG ENABLE_GCC_ARM64 ENABLE_GCC_ARM32
        unset ENABLE_CCACHE NEED_DTBO BUILD_BOOT_IMG PROTON_CLANG_SOURCE PROTON_CLANG_BRANCH
        export PYTHON=python2
        export HOSTCFLAGS="-Wno-error -Wno-error=format-security"
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        # === Common make args ===
        MAKE_ARGS="CC=clang O=out ARCH=${{ env.ARCH }} ${{ env.CUSTOM_CMDS }} CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-"
        # Step 1: Generate .config
        make -j$(nproc --all) ${MAKE_ARGS} ${{ env.KERNEL_CONFIG }}
        # Step 2: Build (capture full log for error diagnosis)
        set +e
        make -j$(nproc --all) ${MAKE_ARGS} 2>&1 | tee out/build.log
        BUILD_RC=${PIPESTATUS[0]}
        set -e
        if [ $BUILD_RC -ne 0 ]; then
          echo ""
          echo "============================================="
          echo "  BUILD FAILED (exit code: $BUILD_RC)"
          echo "============================================="
          echo ""
          echo "=== Last 100 lines of build log ==="
          tail -100 out/build.log
          echo ""
          echo "=== Error/warning lines (last 80) ==="
          grep -iE '(error:|fatal error|make\[.*\]: \*\*\*|undefined reference)' out/build.log | tail -80
          echo ""
          echo "=== Error stats ==="
          TOTAL_ERR=$(grep -c 'error:' out/build.log 2>/dev/null || echo 0)
          TOTAL_WARN=$(grep -c 'warning:' out/build.log 2>/dev/null || echo 0)
          echo "Total error lines: $TOTAL_ERR"
          echo "Total warning lines: $TOTAL_WARN"
          # --- Write Github Actions Annotations (visible on summary page) ---
          echo "=== Annotating errors ==="
          grep -n 'error:' out/build.log | tail -30 | while IFS=: read -r lineno msg; do
            # Extract file path if present (format: path/to/file.c:NN:NN: error: ...)
            srcfile=$(echo "$msg" | sed -n 's/^\([^ :]\+\):\([0-9]\+\):\([0-9]\+\):.*/\1/p')
            srcline=$(echo "$msg" | sed -n 's/^\([^ :]\+\):\([0-9]\+\):\([0-9]\+\):.*/\2/p')
            cleanmsg=$(echo "$msg" | cut -c1-200)
            if [ -n "$srcfile" ]; then
              echo "::error file=${srcfile},line=${srcline},title=Build Error::${cleanmsg}"
            else
              echo "::error title=Build Error::${cleanmsg}"
            fi
          done
          # --- Write Step Summary (visible on run summary page) ---
          {
            echo "## Build Failure Report"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Error lines | $TOTAL_ERR |"
            echo "| Warning lines | $TOTAL_WARN |"
            echo ""
            echo "### Last errors in build log"
            echo '```'
            grep -iE '(error:|fatal error)' out/build.log | tail -15
            echo '```'
            echo ""
            echo "### First make failure"
            echo '```'
            grep 'make\[.*\]: \*\*\*' out/build.log | head -5
            echo '```'
            echo ""
            echo "> Full log available as artifact: \`build-log-sagit-*.zip\`"
          } >> $GITHUB_STEP_SUMMARY
          exit $BUILD_RC
        fi
        echo "=== Build successful ==="
        # --- Write success summary ---
        {
          echo "## Build Succeeded"
          echo "Kernel image: \`${{ env.KERNEL_IMAGE_NAME }}\`"
          echo "Device: \`${{ env.DEVICE }}\`"
        } >> $GITHUB_STEP_SUMMARY

    - name: Upload build log (always)
      if: always()
      uses: actions/upload-artifact@v4
      continue-on-error: true
      with:
        name: build-log-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/android-kernel/out/build.log

    - name: Check kernel output files
      run: |
       cd $GITHUB_WORKSPACE/kernel_workspace
       if [ -f android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
           echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
           echo "Kernel image OK: ${{ env.KERNEL_IMAGE_NAME }}"
       else
           echo "ERROR: Kernel output not found!"
           exit 1
       fi

    - name: Install kernel modules
      if: env.CHECK_FILE_IS_OK == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        make O=out ARCH=${{ env.ARCH }} INSTALL_MOD_PATH=modules modules_install
        echo "=== Installed modules ==="
        find modules -name "*.ko" -type f

    - name: Download MT7601U firmware
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget -O mt7601u.bin https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/mt7601u.bin
        ls -lh mt7601u.bin

    - name: Make Anykernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!block=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/
        # Also copy modules into AnyKernel3 for auto-load
        mkdir -p AnyKernel3/modules
        find android-kernel/modules -name "*.ko" -exec cp {} AnyKernel3/modules/ \;
        rm -rf AnyKernel3/.git* AnyKernel3/README.md

    - name: Upload kernel image
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_IMAGE_NAME }}-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}

    - name: Upload AnyKernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/AnyKernel3/*

    - name: Upload kernel modules
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: |
          kernel_workspace/android-kernel/modules/lib/modules/*/
          !kernel_workspace/android-kernel/modules/lib/modules/*/build
          !kernel_workspace/android-kernel/modules/lib/modules/*/source

    - name: Upload MT7601U firmware
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mt7601u-firmware
        path: kernel_workspace/mt7601u.bin
